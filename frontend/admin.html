<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — AcadSync AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-page="admin">

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>🎓</span>
        <h2>AcadSync AI</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="admin.html" class="active">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="events.html">
          <span class="nav-icon">📅</span> Events
        </a>
        <a href="#">
          <span class="nav-icon">🔔</span> Notifications
        </a>
        <a href="#">
          <span class="nav-icon">👥</span> Users
        </a>
        <a href="#">
          <span class="nav-icon">⚙️</span> Settings
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="avatar">A</div>
        <div class="user-info">
          <div class="user-name">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
        <button onclick="logout()" title="Logout" style="background:none;color:#94a3b8;font-size:1.125rem;">🚪</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Admin Dashboard</h1>
          <p>Manage events, approvals, and campus activities.</p>
        </div>
        <div class="navbar-actions">
          <a href="events.html" class="btn btn-outline btn-sm">View Events</a>
        </div>
      </div>

      <!-- Stats -->
      <div id="stats-grid" class="stats-grid"></div>

      <!-- Dashboard Grid -->
      <div class="dashboard-grid">
        <!-- Pending Approvals -->
        <div class="card">
          <div class="card-header">
            <h3>⏳ Pending Approvals</h3>
          </div>
          <div class="card-body" id="pending-approvals">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Notifications -->
        <div class="card">
          <div class="card-header">
            <h3>🔔 Recent Notifications</h3>
            <button class="btn btn-outline btn-sm">Mark All Read</button>
          </div>
          <div class="card-body" id="notifications-list">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- All Events Table -->
      <div class="card mt-3">
        <div class="card-header">
          <h3>📋 All Events</h3>
        </div>
        <div class="card-body">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Event Name</th>
                  <th>Type</th>
                  <th>Date</th>
                  <th>Organizer</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="events-tbody">
                <!-- Populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="event-detail-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Event Details</h3>
        <button class="modal-close" onclick="closeModal('event-detail-modal')">&times;</button>
      </div>
      <div class="modal-body" id="event-detail-body">
        <!-- Populated by JS -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal('event-detail-modal')">Close</button>
      </div>
    </div>
  </div>

  <!-- Sidebar Toggle for Mobile -->
  <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">☰</button>

  <script src="js/app.js"></script>
</body>
</html>
