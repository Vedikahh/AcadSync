<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AcadSync AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-page="login">

  <div class="login-page">
    <div class="login-card">
      <div class="logo">
        <h2>🎓 AcadSync AI</h2>
        <p>Sign in to your account</p>
      </div>

      <form id="login-form">
        <!-- Role Selector -->
        <div class="role-selector">
          <div class="role-option active" data-role="student">
            <div class="role-icon">🎒</div>
            <div class="role-label">Student</div>
          </div>
          <div class="role-option" data-role="admin">
            <div class="role-icon">🛡️</div>
            <div class="role-label">Admin</div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@university.edu" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
      </form>

      <div class="login-footer">
        <p>Don't have an account? <a href="#">Sign up</a></p>
        <p class="mt-1"><a href="index.html">&larr; Back to home</a></p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
